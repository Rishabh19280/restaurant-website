<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <header class="nav-wrapper">
        <nav class="navbar padding">
            <i class="fa-solid fa-bars" id="toggle"></i>
            <div class="company-logo">
                <a href="#"><img src="image/logo.png" alt="Company Logo"></a>
            </div>
            <ul class="nav-menu">
                <li><i class="fa-solid fa-x" id="close"></i></li>
                <li><a href=""><i class="fa-solid fa-house-chimney"></i> Home</a></li>
                <li><a href=""><i class="fa-regular fa-user"></i> About</a></li>
                <li><a href=""><i class="fa-solid fa-utensils"></i>Menu</a></li>
                <li><a href=""><i class="fa-regular fa-image"></i>Gallery</a></li>
                <li><a href=""><i class="fa-regular fa-calendar"></i>Reservation</a></li>
                <li><a href=""><i class="fa-solid fa-phone"></i>Contact</a></li>
                <li><a href="#" class="book-table-btn">
                        Book a Table
                    </a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count">3</span>
                </div>

                <a href="#" class="book-table-btn">
                    Book a Table
                </a>
            </div>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-content">
            <div class="welcome-wrap">
                <span class="welcome">Welcome to</span>

                <!-- SVG -->
                <svg width="120" height="24" viewBox="0 0 120 24" xmlns="http://www.w3.org/2000/svg">

                    <!-- Left Line -->
                    <line x1="0" y1="12" x2="35" y2="12" stroke="#E67E22" stroke-width="2" />

                    <!-- Stem -->
                    <path d="M35 12 C45 12 50 8 55 12" stroke="#E67E22" stroke-width="2" fill="none" />

                    <!-- Leaf 1 -->
                    <path d="M52 8
           C58 2,65 4,62 10
           C58 12,54 11,52 8Z" fill="#E67E22" />

                    <!-- Leaf 2 -->
                    <path d="M58 12
           C64 8,70 10,68 16
           C63 18,59 16,58 12Z" fill="#E67E22" />

                    <!-- Leaf 3 -->
                    <path d="M47 13
           C42 18,47 22,53 18
           C52 15,50 13,47 13Z" fill="#E67E22" />

                    <!-- Right Curved Branch -->
                    <path d="M60 12 C70 12 75 8 80 12" stroke="#E67E22" stroke-width="2" fill="none" />

                    <!-- Small Right Leaf -->
                    <path d="M78 8
           C84 4,88 6,86 12
           C82 13,79 11,78 8Z" fill="#E67E22" />

                    <!-- Right Line -->
                    <line x1="85" y1="12" x2="120" y2="12" stroke="#E67E22" stroke-width="2" />

                </svg>
            </div>
            <h1>MAMA'S KITCHEN</h1>

            <div class="typing-text">
                <span id="text"></span>
            </div>
            <p>Experience the perfect blend of taste,
                quality and passion in every bite</p>
            <div class="hero-btns">
                <a href="#" class="order-btn">Order Now</a>
                <a href="#" class="book-btn">Book a Table</a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
